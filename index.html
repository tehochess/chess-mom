<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samuel's Chess Academy</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♟</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g900: #192b19;
      --g800: #243d22;
      --g700: #2d5a1b;
      --g600: #3d7525;
      --g500: #4a8f2e;
      --g100: #e6f2de;
      --cream: #faf8f2;
      --cream2: #f0e9d6;
      --cream3: #e5dbc8;
      --gold: #c9a84c;
      --gold2: #d9bb68;
      --text: #1c2018;
      --muted: #68745e;
      --blue: #2563eb;
      --blue-bg: #dbeafe;
      --white: #ffffff;
      --success: #16a34a;
      --danger: #dc2626;
      --sh-sm: 0 2px 8px rgba(25,43,25,.09);
      --sh-md: 0 4px 20px rgba(25,43,25,.13);
      --sh-lg: 0 8px 40px rgba(25,43,25,.18);
      --r: 16px;
      --r-sm: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── HEADER ─────────────────────────────────── */
    .site-header {
      background: var(--g900);
      background-image:
        linear-gradient(45deg, rgba(255,255,255,.03) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,.03) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,.03) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,.03) 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: var(--sh-md);
    }
    .header-inner {
      max-width: 700px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .header-inner h1 {
      color: var(--cream);
      font-size: clamp(1.05rem, 4.5vw, 1.5rem);
      font-weight: 700;
      letter-spacing: -.02em;
      white-space: nowrap;
    }
    .streak-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(201,168,76,.15);
      border: 1.5px solid rgba(201,168,76,.35);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: .85rem;
      font-weight: 700;
      color: var(--gold2);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── LAYOUT ──────────────────────────────────── */
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 16px 56px;
    }

    /* ── VIEWS ───────────────────────────────────── */
    .view { display: none; }
    .view.active { display: block; animation: fadeUp .22s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TYPOGRAPHY ──────────────────────────────── */
    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--g800);
      margin: 28px 0 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--cream3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── STAT CARDS ──────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 20px 0 4px;
    }
    .stat-card {
      background: var(--white);
      border-radius: var(--r-sm);
      box-shadow: var(--sh-sm);
      padding: 16px 10px;
      text-align: center;
      border-top: 3px solid var(--g600);
      transition: transform .15s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-icon { font-size: 1.5rem; margin-bottom: 6px; }
    .stat-num {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--g700);
      line-height: 1;
    }
    .stat-label {
      font-size: .65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-top: 5px;
    }

    /* ── PROGRESS BAR ─────────────────────────────── */
    .progress-wrap {
      background: var(--cream3);
      border-radius: 999px;
      height: 7px;
      margin: 20px 0 24px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--g600), var(--g500));
      border-radius: 999px;
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    /* ── BUTTONS ──────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 14px 22px;
      border-radius: var(--r-sm);
      font-size: .97rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .18s ease;
      -webkit-tap-highlight-color: transparent;
      text-align: center;
      line-height: 1.3;
    }
    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: var(--g700);
      color: var(--white);
      box-shadow: 0 4px 14px rgba(45,90,27,.35);
    }
    .btn-primary:hover { background: var(--g800); box-shadow: 0 6px 20px rgba(45,90,27,.42); transform: translateY(-1px); }

    .btn-gold {
      background: var(--gold);
      color: var(--g900);
      box-shadow: 0 4px 14px rgba(201,168,76,.35);
    }
    .btn-gold:hover { background: var(--gold2); transform: translateY(-1px); }

    .btn-ghost {
      background: var(--white);
      color: var(--text);
      border: 1.5px solid var(--cream3);
      box-shadow: var(--sh-sm);
    }
    .btn-ghost:hover { background: var(--cream); }
    .btn-ghost:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-success { background: var(--success); color: var(--white); box-shadow: 0 4px 12px rgba(22,163,74,.3); }
    .btn-success:hover { background: #15803d; transform: translateY(-1px); }

    .btn-danger  { background: var(--danger);  color: var(--white); box-shadow: 0 4px 12px rgba(220,38,38,.3); }
    .btn-danger:hover  { background: #b91c1c; transform: translateY(-1px); }

    .btn-done {
      background: var(--success);
      color: var(--white);
      box-shadow: 0 4px 12px rgba(22,163,74,.3);
    }

    .btn-full { width: 100%; }

    .action-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 4px;
    }
    @media (min-width: 520px) {
      .action-row { flex-direction: row; }
      .action-row .btn { flex: 1; }
    }

    /* ── CURRICULUM ───────────────────────────────── */
    .week-block {
      background: var(--white);
      border-radius: var(--r);
      box-shadow: var(--sh-sm);
      overflow: hidden;
      margin-bottom: 14px;
    }
    .week-header {
      background: var(--g700);
      color: var(--white);
      padding: 12px 20px;
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
    }
    .lesson-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--cream2);
      cursor: pointer;
      transition: background .13s;
      -webkit-tap-highlight-color: transparent;
    }
    .lesson-row:last-child { border-bottom: none; }
    .lesson-row:hover { background: var(--cream); }

    .lesson-row.is-today {
      background: var(--blue-bg);
      border-left: 3px solid var(--blue);
      padding-left: 17px;
    }
    .lesson-row.is-today .lesson-name { color: var(--blue); font-weight: 600; }
    .lesson-row.is-done .lesson-name  { text-decoration: line-through; color: var(--muted); }

    .cb {
      width: 22px; height: 22px;
      flex-shrink: 0;
      appearance: none;
      -webkit-appearance: none;
      border: 2px solid #c8d0c0;
      border-radius: 6px;
      cursor: pointer;
      position: relative;
      transition: all .18s;
      background: var(--white);
    }
    .cb:checked { background: var(--g600); border-color: var(--g600); }
    .cb:checked::after {
      content: '';
      position: absolute;
      left: 4px; top: 1px;
      width: 10px; height: 6px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg);
    }

    .lesson-meta { flex: 1; min-width: 0; }
    .lesson-day-lbl {
      font-size: .65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .lesson-name { font-size: .88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .today-pill {
      background: var(--blue);
      color: #fff;
      font-size: .62rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: .05em;
      flex-shrink: 0;
    }

    /* ── LESSON VIEW ──────────────────────────────── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: .88rem;
      font-weight: 500;
      cursor: pointer;
      padding: 16px 0 6px;
      transition: color .13s;
    }
    .back-btn:hover { color: var(--text); }

    .lesson-meta-row {
      font-size: .72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .09em;
      margin-bottom: 6px;
      margin-top: 4px;
    }
    .lesson-view-title {
      font-size: clamp(1.2rem, 5vw, 1.6rem);
      font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: 16px;
    }

    .lesson-desc {
      background: var(--white);
      border-radius: var(--r);
      padding: 20px 22px;
      margin-bottom: 16px;
      box-shadow: var(--sh-sm);
      font-size: .97rem;
      line-height: 1.75;
      color: var(--text);
      border-left: 4px solid var(--g600);
    }

    .board-wrap {
      background: var(--white);
      border-radius: var(--r);
      padding: 8px;
      box-shadow: var(--sh-md);
      margin-bottom: 16px;
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }
    .board-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: var(--r-sm);
      display: block;
    }

    .lesson-nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }
    .lesson-nav-pos {
      text-align: center;
      font-size: .82rem;
      color: var(--muted);
      font-weight: 600;
    }

    /* ── PUZZLE VIEW ──────────────────────────────── */
    .puzzle-wrap {
      background: var(--white);
      border-radius: var(--r);
      padding: 8px;
      box-shadow: var(--sh-md);
      margin-bottom: 16px;
      aspect-ratio: 4 / 3;
      overflow: hidden;
    }
    .puzzle-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: var(--r-sm);
      display: block;
    }
    .puzzle-hint {
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .puzzle-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ── RESPONSIVE ───────────────────────────────── */
    @media (max-width: 380px) {
      .stats-grid { gap: 8px; }
      .stat-card  { padding: 12px 6px; }
      .stat-num   { font-size: 1.5rem; }
      .stat-label { font-size: .58rem; }
      .header-inner { padding: 14px 14px; }
    }

    /* ── COMPLETION CARD ──────────────────────────── */
    .complete-card {
      background: linear-gradient(135deg, var(--g800), var(--g600));
      border-radius: var(--r);
      padding: 28px 24px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: var(--sh-lg);
    }
    .complete-card .big-emoji { font-size: 2.4rem; display: block; margin-bottom: 10px; }
    .complete-card h2 { color: #fff; margin-bottom: 6px; font-size: 1.3rem; }
    .complete-card p  { color: rgba(255,255,255,.8); font-size: .9rem; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <h1>♟ Samuel's Chess Academy</h1>
    <div class="streak-badge">🔥 <span class="streak-count">1</span> day streak</div>
  </div>
</header>

<!-- ════════════════════════════════════════════
     VIEW 1 · DASHBOARD
════════════════════════════════════════════ -->
<div id="v-dashboard" class="view active">
  <div class="container">

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📚</div>
        <div class="stat-num" id="stat-lessons">0</div>
        <div class="stat-label">Lessons Done</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🧩</div>
        <div class="stat-num" id="stat-puzzles">0</div>
        <div class="stat-label">Puzzles Solved</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏳</div>
        <div class="stat-num" id="stat-days">30</div>
        <div class="stat-label">Days Left</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-fill" id="prog-bar" style="width:0%"></div>
    </div>

    <!-- Action buttons -->
    <div class="action-row">
      <button class="btn btn-primary btn-full" id="btn-start">▶ Start Today's Lesson</button>
      <button class="btn btn-gold    btn-full" id="btn-puzzle">🧩 Daily Puzzle</button>
    </div>

    <!-- Curriculum -->
    <div class="section-title">📋 4-Week Curriculum</div>
    <div id="curriculum"></div>

  </div>
</div>

<!-- ════════════════════════════════════════════
     VIEW 2 · LESSON
════════════════════════════════════════════ -->
<div id="v-lesson" class="view">
  <div class="container">

    <button class="back-btn" id="btn-lesson-back">← Back to Home</button>

    <div class="lesson-meta-row" id="l-week-label">Week 1 · Day 1</div>
    <h2 class="lesson-view-title" id="l-title">Lesson Title</h2>

    <div class="lesson-desc" id="l-desc">Description goes here.</div>

    <div class="board-wrap">
      <iframe id="l-board" src="" title="Chess board" allowfullscreen></iframe>
    </div>

    <button class="btn btn-primary btn-full" id="btn-complete" style="margin-bottom:14px">
      ✓ Mark as Complete
    </button>

    <div class="lesson-nav">
      <button class="btn btn-ghost" id="btn-prev">← Prev</button>
      <div class="lesson-nav-pos" id="l-pos">1 / 28</div>
      <button class="btn btn-ghost" id="btn-next">Next →</button>
    </div>

  </div>
</div>

<!-- ════════════════════════════════════════════
     VIEW 3 · DAILY PUZZLE
════════════════════════════════════════════ -->
<div id="v-puzzle" class="view">
  <div class="container">

    <button class="back-btn" id="btn-puzzle-back">← Back to Home</button>

    <div class="lesson-meta-row">Daily Challenge</div>
    <h2 class="lesson-view-title">Today's Puzzle</h2>

    <p class="puzzle-hint">Find the best move for the highlighted side. Take your time!</p>

    <div class="puzzle-wrap">
      <iframe
        src="https://lichess.org/training/frame?theme=brown&bg=light"
        title="Daily chess puzzle"
        allowfullscreen>
      </iframe>
    </div>

    <div class="puzzle-btns">
      <button class="btn btn-success" id="btn-solved">✓ Solved it!</button>
      <button class="btn btn-danger"  id="btn-failed">✗ Couldn't get it</button>
    </div>

  </div>
</div>


<script>
// ============================================================
// LESSON DATA
// ============================================================
const LESSONS = [
  // ── WEEK 1: Pieces & Rules ──────────────────────────────
  {
    week:1, day:1,
    title:"Meet the Board",

// ============================================================
// STORAGE HELPERS
// ============================================================
const LS = {
  get(k, def) {
    try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; }
    catch { return def; }
  },
  set(k, v) {
    try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
  }
};

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}

// ============================================================
// STATE INIT (runs once on load)
// ============================================================
function initState() {
  const today = todayStr();

  // First visit: record start date
  if (!LS.get('startDate', null)) {
    LS.set('startDate', today);
  }

  // Streak logic
  const last   = LS.get('lastVisit', null);
  let   streak = LS.get('streak', 1);

  if (!last) {
    streak = 1;
  } else if (last === today) {
    // already visited today — no change
  } else {
    const diff = daysBetween(last, today);
    streak = diff === 1 ? streak + 1 : 1;
  }

  LS.set('lastVisit', today);
  LS.set('streak',    streak);

  // Ensure arrays / counters exist
  if (!LS.get('completed', null))         LS.set('completed', []);
  if (LS.get('puzzlesSolved', null) === null) LS.set('puzzlesSolved', 0);
  if (LS.get('currentLesson', null) === null) LS.set('currentLesson', 0);
}

function getState() {
  const today      = todayStr();
  const startDate  = LS.get('startDate', today);
  const daysSince  = daysBetween(startDate, today);
  return {
    streak:       LS.get('streak', 1),
    completed:    LS.get('completed', []),
    puzzlesSolved:LS.get('puzzlesSolved', 0),
    daysLeft:     Math.max(0, 30 - daysSince),
    todayLesson:  Math.min(daysSince, LESSONS.length - 1),
    currentLesson:LS.get('currentLesson', 0)
  };
}

// ============================================================
// VIEW SWITCHING
// ============================================================
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// DASHBOARD
// ============================================================
const WEEK_LABELS = {
  1: '📖 Week 1 — Pieces & Rules',
  2: '⚔️ Week 2 — Tactics',
  3: '🏰 Week 3 — Openings',
  4: '🏆 Week 4 — Beat Dad'
};

function renderDashboard() {
  const { streak, completed, puzzlesSolved, daysLeft, todayLesson } = getState();

  // Streak badges (one per view header)
  document.querySelectorAll('.streak-count').forEach(el => el.textContent = streak);

  // Stats
  document.getElementById('stat-lessons').textContent = completed.length;
  document.getElementById('stat-puzzles').textContent  = puzzlesSolved;
  document.getElementById('stat-days').textContent     = daysLeft;

  // Progress bar
  const pct = Math.round((completed.length / LESSONS.length) * 100);
  document.getElementById('prog-bar').style.width = pct + '%';

  // Curriculum
  const container = document.getElementById('curriculum');

  // Group by week
  const weeks = [1,2,3,4].map(w => LESSONS.map((l,i) => ({...l, index:i})).filter(l => l.week === w));

  let html = '';

  // All-done banner
  if (completed.length === LESSONS.length) {
    html += `
      <div class="complete-card">
        <span class="big-emoji">🏆</span>
        <h2>Course Complete!</h2>
        <p>You've finished all 28 lessons. Time to beat Dad — you're ready!</p>
      </div>`;
  }

  weeks.forEach((group, wi) => {
    const w = wi + 1;
    const rows = group.map(l => {
      const isDone  = completed.includes(l.index);
      const isToday = l.index === todayLesson;
      return `
        <div class="lesson-row${isDone ? ' is-done' : ''}${isToday ? ' is-today' : ''}"
             data-idx="${l.index}"
             onclick="openLesson(${l.index})">
          <input type="checkbox"
                 class="cb"
                 ${isDone ? 'checked' : ''}
                 onclick="event.stopPropagation(); toggleDone(${l.index})">
          <div class="lesson-meta">
            <div class="lesson-day-lbl">Day ${l.day}</div>
            <div class="lesson-name">${l.title}</div>
          </div>
          ${isToday ? '<span class="today-pill">Today</span>' : ''}
        </div>`;
    }).join('');

    html += `
      <div class="week-block">
        <div class="week-header">${WEEK_LABELS[w]}</div>
        ${rows}
      </div>`;
  });

  container.innerHTML = html;
}

function toggleDone(index) {
  let arr = LS.get('completed', []);
  if (arr.includes(index)) {
    arr = arr.filter(i => i !== index);
  } else {
    arr.push(index);
  }
  LS.set('completed', arr);
  renderDashboard();
}

function openLesson(index) {
  LS.set('currentLesson', index);
  renderLesson(index);
  showView('v-lesson');
}

// ============================================================
// LESSON VIEW
// ============================================================
function renderLesson(index) {
  const l = LESSONS[index];
  if (!l) return;

  const completed = LS.get('completed', []);
  const isDone    = completed.includes(index);

  document.getElementById('l-week-label').textContent = `Week ${l.week} · Day ${l.day}`;
  document.getElementById('l-title').textContent      = l.title;
  document.getElementById('l-desc').textContent       = l.desc;
  document.getElementById('l-pos').textContent        = `${index + 1} / ${LESSONS.length}`;

  // Lichess board with FEN
  document.getElementById('l-board').src =
    `https://lichess.org/embed/frame?theme=brown&bg=light&fen=${encodeURIComponent(l.fen)}`;

  // Complete button
  const btnC = document.getElementById('btn-complete');
  if (isDone) {
    btnC.textContent = '✓ Completed!';
    btnC.className   = 'btn btn-done btn-full';
  } else {
    btnC.textContent = '✓ Mark as Complete';
    btnC.className   = 'btn btn-primary btn-full';
  }

  // Prev / Next
  document.getElementById('btn-prev').disabled = index === 0;
  document.getElementById('btn-next').disabled = index === LESSONS.length - 1;

  LS.set('currentLesson', index);

  // Keep streak badges in sync
  const { streak } = getState();
  document.querySelectorAll('.streak-count').forEach(el => el.textContent = streak);
}

// ============================================================
// EVENT WIRING
// ============================================================

// Dashboard buttons
document.getElementById('btn-start').addEventListener('click', () => {
  const { todayLesson } = getState();
  openLesson(todayLesson);
});

document.getElementById('btn-puzzle').addEventListener('click', () => showView('v-puzzle'));

// Lesson navigation
document.getElementById('btn-lesson-back').addEventListener('click', () => {
  renderDashboard();
  showView('v-dashboard');
});

document.getElementById('btn-prev').addEventListener('click', () => {
  const cur = LS.get('currentLesson', 0);
  if (cur > 0) renderLesson(cur - 1);
});

document.getElementById('btn-next').addEventListener('click', () => {
  const cur = LS.get('currentLesson', 0);
  if (cur < LESSONS.length - 1) renderLesson(cur + 1);
});

document.getElementById('btn-complete').addEventListener('click', () => {
  const cur       = LS.get('currentLesson', 0);
  const completed = LS.get('completed', []);
  const wasDone   = completed.includes(cur);

  toggleDone(cur);      // toggle in/out
  renderLesson(cur);    // refresh button state

  if (!wasDone) {
    // Just completed — auto-advance after a beat
    setTimeout(() => {
      if (cur < LESSONS.length - 1) {
        renderLesson(cur + 1);
      } else {
        renderDashboard();
        showView('v-dashboard');
      }
    }, 750);
  }
});

// Puzzle buttons
document.getElementById('btn-puzzle-back').addEventListener('click', () => {
  renderDashboard();
  showView('v-dashboard');
});

document.getElementById('btn-solved').addEventListener('click', () => {
  LS.set('puzzlesSolved', LS.get('puzzlesSolved', 0) + 1);
  renderDashboard();
  showView('v-dashboard');
});

document.getElementById('btn-failed').addEventListener('click', () => {
  renderDashboard();
  showView('v-dashboard');
});

// ============================================================
// BOOT
// ============================================================
initState();
renderDashboard();
</script>
