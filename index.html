<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samuel's Chess Academy</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♟</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1a2e1a;
      --green-mid:   #2d5a2d;
      --green-light: #3d7a3d;
      --green-accent:#4e9e4e;
      --cream:       #faf6ee;
      --cream2:      #f0e9d6;
      --cream3:      #e2d5be;
      --gold:        #c9a84c;
      --text:        #1c2018;
      --muted:       #6b7a62;
      --white:       #ffffff;
      --success-bg:  #dcfce7;
      --success-txt: #166534;
      --error-bg:    #fee2e2;
      --error-txt:   #991b1b;
      --radius:      14px;
      --radius-sm:   8px;
      --shadow:      0 4px 24px rgba(26,46,26,.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── HEADER ──────────────────────────────────────── */
    .header {
      background: var(--green-dark);
      color: var(--cream);
      padding: 20px 16px 18px;
      text-align: center;
    }

    .header-title {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: -.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .header-title .piece { font-size: 1.15em; line-height: 1; }

    .header-stats {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: .85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }

    .stat-chip .icon { font-size: 1rem; }
    .stat-chip .value { color: var(--gold); font-weight: 700; font-size: .95rem; }

    /* ── TABS ────────────────────────────────────────── */
    .tabs-bar {
      background: var(--green-mid);
      display: flex;
      width: 100%;
    }

    .tab-btn {
      flex: 1 1 0;
      min-width: 0;
      padding: 13px 6px;
      border: none;
      background: transparent;
      color: rgba(250,246,238,.65);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, color .2s;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
    }

    .tab-btn:hover { color: var(--cream); background: rgba(255,255,255,.05); }

    .tab-btn.active {
      color: var(--cream);
      border-bottom-color: var(--gold);
      background: rgba(255,255,255,.07);
    }

    /* ── CONTENT ─────────────────────────────────────── */
    .content {
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* coming soon */
    .coming-soon {
      text-align: center;
      padding: 60px 20px;
    }

    .coming-soon .cs-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }

    .coming-soon h2 {
      font-size: 1.5rem;
      color: var(--green-mid);
      margin-bottom: 8px;
    }

    .coming-soon p {
      color: var(--muted);
      font-size: .95rem;
    }

    /* ── ASK COACH ───────────────────────────────────── */
    .coach-card {
      background: var(--white);
      border: 1px solid var(--cream3);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: var(--shadow);
    }

    .coach-card h2 {
      font-size: 1.25rem;
      color: var(--green-dark);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .coach-card .subtitle {
      color: var(--muted);
      font-size: .88rem;
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: .9rem;
      color: var(--green-dark);
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      border: 1.5px solid var(--cream3);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: .95rem;
      font-family: inherit;
      color: var(--text);
      background: var(--cream);
      resize: vertical;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--green-accent);
      box-shadow: 0 0 0 3px rgba(78,158,78,.15);
      background: var(--white);
    }

    .submit-btn {
      margin-top: 14px;
      width: 100%;
      padding: 13px;
      background: var(--green-mid);
      color: var(--cream);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    .submit-btn:hover:not(:disabled) { background: var(--green-light); }
    .submit-btn:active:not(:disabled) { transform: scale(.98); }
    .submit-btn:disabled { opacity: .55; cursor: not-allowed; }

    .msg {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: .9rem;
      font-weight: 500;
      display: none;
    }
    .msg.success { display: block; background: var(--success-bg); color: var(--success-txt); }
    .msg.error   { display: block; background: var(--error-bg);   color: var(--error-txt); }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 400px) {
      .coach-card { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-title">
    <span class="piece">♟</span>
    Samuel's Chess Academy
  </div>
  <div class="header-stats">
    <div class="stat-chip">
      <span class="icon">🔥</span>
      Streak: <span class="value" id="streakVal">0</span> days
    </div>
    <div class="stat-chip">
      <span class="icon">📅</span>
      Days remaining: <span class="value" id="daysVal">30</span>
    </div>
  </div>
</header>

<!-- TABS -->
<nav class="tabs-bar" role="tablist">
  <button class="tab-btn active" role="tab" data-tab="lessons">Daily Lessons</button>
  <button class="tab-btn"        role="tab" data-tab="puzzles">Puzzles</button>
  <button class="tab-btn"        role="tab" data-tab="coach">Ask Coach</button>
</nav>

<!-- CONTENT -->
<main class="content">

  <!-- Daily Lessons -->
  <section class="tab-panel active" id="panel-lessons" role="tabpanel">
    <div class="coming-soon">
      <div class="cs-icon">📖</div>
      <h2>Coming Soon</h2>
      <p>Daily lessons are on their way. Check back soon!</p>
    </div>
  </section>

  <!-- Puzzles -->
  <section class="tab-panel" id="panel-puzzles" role="tabpanel">
    <div class="coming-soon">
      <div class="cs-icon">🧩</div>
      <h2>Coming Soon</h2>
      <p>Chess puzzles are being prepared. Stay tuned!</p>
    </div>
  </section>

  <!-- Ask Coach -->
  <section class="tab-panel" id="panel-coach" role="tabpanel">
    <div class="coach-card">
      <h2>🎓 Ask Coach Samuel</h2>
      <p class="subtitle">Type your chess question below and Samuel will get back to you.</p>
      <form id="coachForm" novalidate>
        <label for="questionBox">Your question</label>
        <textarea id="questionBox" placeholder="e.g. How do I defend against the King's Gambit?" required></textarea>
        <button type="submit" class="submit-btn" id="submitBtn">Send Question</button>
      </form>
      <div class="msg" id="statusMsg"></div>
    </div>
  </section>

</main>

<script>
  // ── EmailJS config (fetch API — no SDK needed) ─────────────────────────────
  const EMAILJS_PUBLIC_KEY  = '62KDMFVzdGnMxMNjW';
  const EMAILJS_SERVICE_ID  = 'service_8gur3em';
  const EMAILJS_TEMPLATE_ID = 'template_q0skdh9';
  // ───────────────────────────────────────────────────────────────────────────

  async function sendViaEmailJS(message) {
    const res = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        service_id:  EMAILJS_SERVICE_ID,
        template_id: EMAILJS_TEMPLATE_ID,
        user_id:     EMAILJS_PUBLIC_KEY,
        template_params: {
          message:  message,
          to_email: 'he.samuel300@gmail.com',
        },
      }),
    });
    if (!res.ok) {
      const text = await res.text().catch(() => res.status);
      throw new Error(text || res.status);
    }
  }

  // ── Streak & days remaining (localStorage) ─────────────────────────────────
  const CHALLENGE_DAYS = 30;

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function daysBetween(a, b) {
    const msPerDay = 864e5;
    return Math.round((new Date(b) - new Date(a)) / msPerDay);
  }

  function initStats() {
    const today = todayStr();
    let streak        = parseInt(localStorage.getItem('streak') || '0', 10);
    let lastVisit     = localStorage.getItem('lastVisit') || '';
    let challengeStart = localStorage.getItem('challengeStart') || today;

    if (!localStorage.getItem('challengeStart')) {
      localStorage.setItem('challengeStart', today);
    }

    if (lastVisit === today) {
      // already visited today — no change
    } else if (lastVisit && daysBetween(lastVisit, today) === 1) {
      streak += 1;
    } else {
      streak = 1;
    }

    localStorage.setItem('streak', streak);
    localStorage.setItem('lastVisit', today);

    const elapsed = daysBetween(challengeStart, today);
    const daysLeft = Math.max(0, CHALLENGE_DAYS - elapsed);

    document.getElementById('streakVal').textContent = streak;
    document.getElementById('daysVal').textContent   = daysLeft;
  }

  // ── Tabs ───────────────────────────────────────────────────────────────────
  const tabBtns   = document.querySelectorAll('.tab-btn');
  const tabPanels = document.querySelectorAll('.tab-panel');

  function switchTab(id) {
    tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === id));
    tabPanels.forEach(p => p.classList.toggle('active', p.id === 'panel-' + id));
    localStorage.setItem('activeTab', id);
  }

  tabBtns.forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

  const savedTab = localStorage.getItem('activeTab');
  if (savedTab) switchTab(savedTab);

  // ── Ask Coach form ─────────────────────────────────────────────────────────
  const form      = document.getElementById('coachForm');
  const question  = document.getElementById('questionBox');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');

  function showMsg(type, text) {
    statusMsg.className = 'msg ' + type;
    statusMsg.textContent = text;
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const text = question.value.trim();
    if (!text) { question.focus(); return; }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';
    statusMsg.className = 'msg';

    try {
      await sendViaEmailJS(text);
      showMsg('success', 'Question sent! Samuel will review and get back to you.');
      question.value = '';
    } catch (err) {
      console.error('EmailJS error:', err);
      showMsg('error', 'Could not send — please try again later.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Question';
    }
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  initStats();
</script>
</body>
</html>
