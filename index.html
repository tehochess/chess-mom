<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samuel's Chess Academy</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♟</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1a2e1a;
      --green-mid:   #2d5a2d;
      --green-light: #3d7a3d;
      --green-accent:#4e9e4e;
      --cream:       #faf6ee;
      --cream2:      #f0e9d6;
      --cream3:      #e2d5be;
      --gold:        #c9a84c;
      --text:        #1c2018;
      --muted:       #6b7a62;
      --white:       #ffffff;
      --success-bg:  #dcfce7;
      --success-txt: #166534;
      --error-bg:    #fee2e2;
      --error-txt:   #991b1b;
      --radius:      14px;
      --radius-sm:   8px;
      --shadow:      0 4px 24px rgba(26,46,26,.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── HEADER ──────────────────────────────────────── */
    .header {
      background: var(--green-dark);
      color: var(--cream);
      padding: 20px 16px 18px;
      text-align: center;
    }

    .header-title {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: -.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .header-title .piece { font-size: 1.15em; line-height: 1; }

    .header-stats {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: .85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }

    .stat-chip .icon { font-size: 1rem; }
    .stat-chip .value { color: var(--gold); font-weight: 700; font-size: .95rem; }

    /* ── TABS ────────────────────────────────────────── */
    .tabs-bar {
      background: var(--green-mid);
      display: flex;
      width: 100%;
    }

    .tab-btn {
      flex: 1 1 0;
      min-width: 0;
      padding: 13px 6px;
      border: none;
      background: transparent;
      color: rgba(250,246,238,.65);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, color .2s;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
    }

    .tab-btn:hover { color: var(--cream); background: rgba(255,255,255,.05); }

    .tab-btn.active {
      color: var(--cream);
      border-bottom-color: var(--gold);
      background: rgba(255,255,255,.07);
    }

    /* ── CONTENT ─────────────────────────────────────── */
    .content {
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* coming soon */
    .coming-soon {
      text-align: center;
      padding: 60px 20px;
    }

    .coming-soon .cs-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }

    .coming-soon h2 {
      font-size: 1.5rem;
      color: var(--green-mid);
      margin-bottom: 8px;
    }

    .coming-soon p {
      color: var(--muted);
      font-size: .95rem;
    }

    /* ── ASK COACH ───────────────────────────────────── */
    .coach-card {
      background: var(--white);
      border: 1px solid var(--cream3);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: var(--shadow);
    }

    .coach-card h2 {
      font-size: 1.25rem;
      color: var(--green-dark);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .coach-card .subtitle {
      color: var(--muted);
      font-size: .88rem;
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: .9rem;
      color: var(--green-dark);
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      border: 1.5px solid var(--cream3);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: .95rem;
      font-family: inherit;
      color: var(--text);
      background: var(--cream);
      resize: vertical;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--green-accent);
      box-shadow: 0 0 0 3px rgba(78,158,78,.15);
      background: var(--white);
    }

    .submit-btn {
      margin-top: 14px;
      width: 100%;
      padding: 13px;
      background: var(--green-mid);
      color: var(--cream);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    .submit-btn:hover:not(:disabled) { background: var(--green-light); }
    .submit-btn:active:not(:disabled) { transform: scale(.98); }
    .submit-btn:disabled { opacity: .55; cursor: not-allowed; }

    .msg {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: .9rem;
      font-weight: 500;
      display: none;
    }
    .msg.success { display: block; background: var(--success-bg); color: var(--success-txt); }
    .msg.error   { display: block; background: var(--error-bg);   color: var(--error-txt); }

    /* ── COACH VIEW ──────────────────────────────────── */
    #coachView { display: none; }
    #coachView.active { display: block; }

    .cv-header {
      background: var(--green-dark);
      color: var(--cream);
      padding: 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .cv-header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cv-clear-btn {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
      color: var(--cream);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .cv-clear-btn:hover { background: rgba(220,38,38,.55); }

    .cv-content {
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .cv-count {
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .cv-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: .95rem;
    }

    .q-card {
      background: var(--white);
      border: 1px solid var(--cream3);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .q-meta {
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .q-num {
      background: var(--green-mid);
      color: var(--cream);
      border-radius: 999px;
      padding: 1px 8px;
      font-size: .72rem;
      font-weight: 700;
    }

    .q-text {
      font-size: .95rem;
      color: var(--text);
      line-height: 1.55;
      white-space: pre-wrap;
    }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 400px) {
      .coach-card { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-title">
    <span class="piece">♟</span>
    Samuel's Chess Academy
  </div>
  <div class="header-stats">
    <div class="stat-chip">
      <span class="icon">🔥</span>
      Streak: <span class="value" id="streakVal">0</span> days
    </div>
    <div class="stat-chip">
      <span class="icon">📅</span>
      Days remaining: <span class="value" id="daysVal">30</span>
    </div>
  </div>
</header>

<!-- TABS -->
<nav class="tabs-bar" role="tablist">
  <button class="tab-btn active" role="tab" data-tab="lessons">Daily Lessons</button>
  <button class="tab-btn"        role="tab" data-tab="puzzles">Puzzles</button>
  <button class="tab-btn"        role="tab" data-tab="coach">Ask Coach</button>
</nav>

<!-- CONTENT -->
<main class="content">

  <!-- Daily Lessons -->
  <section class="tab-panel active" id="panel-lessons" role="tabpanel">
    <div class="coming-soon">
      <div class="cs-icon">📖</div>
      <h2>Coming Soon</h2>
      <p>Daily lessons are on their way. Check back soon!</p>
    </div>
  </section>

  <!-- Puzzles -->
  <section class="tab-panel" id="panel-puzzles" role="tabpanel">
    <div class="coming-soon">
      <div class="cs-icon">🧩</div>
      <h2>Coming Soon</h2>
      <p>Chess puzzles are being prepared. Stay tuned!</p>
    </div>
  </section>

  <!-- Ask Coach -->
  <section class="tab-panel" id="panel-coach" role="tabpanel">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSegK-HKLL7gvxn2IqiWt0_VwGfY2BXLLjJmbl0wo7La8wR_iQ/viewform?embedded=true"
      width="100%"
      height="600"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      style="border-radius: var(--radius); display: block;">
      Loading…
    </iframe>
  </section>

</main>

<!-- COACH VIEW (hidden; access via #coach in URL) -->
<div id="coachView">
  <div class="cv-header">
    <h1>🎓 Coach View — Questions</h1>
    <button class="cv-clear-btn" id="clearBtn">Clear all</button>
  </div>
  <div class="cv-content">
    <p class="cv-count" id="cvCount"></p>
    <div id="cvList"></div>
  </div>
</div>

<script>
  // ── Streak & days remaining (localStorage) ─────────────────────────────────
  const CHALLENGE_DAYS = 30;

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function daysBetween(a, b) {
    return Math.round((new Date(b) - new Date(a)) / 864e5);
  }

  function initStats() {
    const today = todayStr();
    let streak         = parseInt(localStorage.getItem('streak') || '0', 10);
    const lastVisit    = localStorage.getItem('lastVisit') || '';
    const challengeStart = localStorage.getItem('challengeStart') || today;

    if (!localStorage.getItem('challengeStart')) {
      localStorage.setItem('challengeStart', today);
    }

    if (lastVisit === today) {
      // already visited today — no change
    } else if (lastVisit && daysBetween(lastVisit, today) === 1) {
      streak += 1;
    } else {
      streak = 1;
    }

    localStorage.setItem('streak', streak);
    localStorage.setItem('lastVisit', today);

    const daysLeft = Math.max(0, CHALLENGE_DAYS - daysBetween(challengeStart, today));
    document.getElementById('streakVal').textContent = streak;
    document.getElementById('daysVal').textContent   = daysLeft;
  }

  // ── Tabs ───────────────────────────────────────────────────────────────────
  const tabBtns   = document.querySelectorAll('.tab-btn');
  const tabPanels = document.querySelectorAll('.tab-panel');

  function switchTab(id) {
    tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === id));
    tabPanels.forEach(p => p.classList.toggle('active', p.id === 'panel-' + id));
    localStorage.setItem('activeTab', id);
  }

  tabBtns.forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

  const savedTab = localStorage.getItem('activeTab');
  if (savedTab) switchTab(savedTab);

  // ── Coach View ─────────────────────────────────────────────────────────────
  function formatDate(iso) {
    return new Date(iso).toLocaleString(undefined, {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: 'numeric', minute: '2-digit',
    });
  }

  function renderCoachView() {
    const questions = loadQuestions().slice().reverse(); // newest first
    const count     = document.getElementById('cvCount');
    const list      = document.getElementById('cvList');

    count.textContent = questions.length
      ? `${questions.length} question${questions.length === 1 ? '' : 's'} submitted`
      : '';

    if (questions.length === 0) {
      list.innerHTML = '<p class="cv-empty">No questions yet.</p>';
      return;
    }

    list.innerHTML = questions.map((q, i) => `
      <div class="q-card">
        <div class="q-meta">
          <span class="q-num">#${questions.length - i}</span>
          ${formatDate(q.ts)}
        </div>
        <div class="q-text">${q.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      </div>
    `).join('');
  }

  function initCoachView() {
    document.getElementById('coachView').classList.add('active');
    document.querySelector('.header').style.display     = 'none';
    document.querySelector('.tabs-bar').style.display   = 'none';
    document.querySelector('.content').style.display    = 'none';
    renderCoachView();

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (confirm('Clear all questions? This cannot be undone.')) {
        localStorage.removeItem(QUESTIONS_KEY);
        renderCoachView();
      }
    });
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  if (window.location.hash === '#coach') {
    initCoachView();
  } else {
    initStats();
  }
</script>
</body>
</html>
